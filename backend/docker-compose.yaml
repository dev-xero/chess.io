services:
  backend:
    build: .
    restart: unless-stopped
    ports:
      - 8080:8080
    env_file:
      - .env
    develop:
      watch:
        - action: sync
          path: .
          target: /app
        - action: rebuild
          path: go.sum
        - action: rebuild
          path: .env

  database:
    image: postgres:18
    ports:
      - 15432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
      POSTGRES_DB: ${POSTGRES_NAME}
    volumes:
      - db-data:/var/lib/postgresql

volumes:
  db-data:
